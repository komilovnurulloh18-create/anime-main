<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime shop — Orders</title>  
    <link rel="stylesheet" href="css/output.css" />
    <link rel="stylesheet" href="css/theme.css" />
  </head>
  <body class="anime-bg text-white">
    <!-- ====== NAVBAR ====== -->
    <header class="fixed top-0 z-50 flex h-14 w-full items-center glass-soft px-4 md:hidden">
      <a href="index.html" class="text-lg font-semibold text-white">Anime shop</a>
    </header>
    <header class="hidden glass-soft md:block">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a href="index.html" class="text-xl font-bold text-white">Anime shop</a>
        <nav class="flex items-center gap-3 text-sm">
          <a href="index.html" class="text-slate-200 hover:text-white" data-i18n="home"></a>
          <a href="catalog.html" class="text-slate-200 hover:text-white" data-i18n="catalog"></a>
        </nav>
        <div class="flex items-center gap-4 text-sm">
          <a href="cart.html" class="relative">
            🛒
            <span class="absolute -right-2 -top-2 flex h-5 w-5 items-center justify-center rounded-full bg-white text-xs font-semibold text-slate-900" data-cart-count>0</span>
          </a>
          <a href="account.html" class="text-slate-200 hover:text-white" data-i18n="account"></a>
          <select data-lang-switch class="rounded-lg border border-slate-800 bg-slate-900 px-2 py-1 text-xs text-white">
            <option value="uz">UZ</option>
            <option value="ru">RU</option>
          </select>
        </div>
      </div>
    </header>

    <!-- ====== ORDERS ====== -->
    <main class="bottom-safe mx-auto max-w-6xl space-y-6 px-4 pt-14 md:pt-20">
      <h1 class="text-2xl font-semibold text-white" data-i18n="orders_title"></h1>
      <div id="orders-offline" class="hidden rounded-2xl glass-soft px-4 py-2 text-xs text-white/80">
        Internet yo‘q
      </div>
      <div id="orders-empty" class="hidden rounded-2xl glass p-6 text-center text-sm text-white/80 shadow-sm" data-i18n="orders_empty"></div>
      <div id="orders-list" class="space-y-4"></div>
    </main>

    <div id="order-modal" class="fixed inset-0 hidden bg-black/60">
      <div class="mx-auto mt-24 max-w-lg rounded-2xl glass p-6 shadow-xl">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-white" data-i18n="order_detail"></h2>
          <button id="modal-close" class="text-slate-400">✕</button>
        </div>
        <div id="modal-content" class="mt-4"></div>
      </div>
    </div>

    <!-- ====== BOTTOM NAV ====== -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 z-50 border border-white/10 glass-soft md:hidden">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-3 text-xs text-white/70">
        <a href="index.html" class="nav-item">
          <span>🏠</span>
          <span data-i18n="home"></span>
        </a>
        <a href="catalog.html" class="nav-item">
          <span>🛍️</span>
          <span data-i18n="catalog"></span>
        </a>
        <a href="cart.html" class="nav-item relative">
          <span>🛒</span>
          <span data-i18n="cart"></span>
          <span class="absolute -right-2 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-white text-[10px] font-semibold text-slate-900" data-cart-count>0</span>
        </a>
        <a href="account.html" class="nav-item">
          <span>👤</span>
          <span data-i18n="account"></span>
        </a>
      </div>
    </nav>

    <script type="module" src="js/orders.js"></script>
  </body>
</html>
